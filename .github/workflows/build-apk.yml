name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build with Buildozer Docker image
      env:
        GITHUB_WORKSPACE: ${{ github.workspace }}
      run: |
        # Pull a stable Buildozer image that contains Android toolchains
        docker pull kivy/buildozer:latest

        # Run the Buildozer container, mount the repository, and build a debug APK
        docker run --rm \
          -v "${GITHUB_WORKSPACE}:/home/user/hostcwd" \
          -w /home/user/hostcwd \
          kivy/buildozer:latest \
          /bin/bash -lc "set -euo pipefail && pip install --upgrade pip || true && if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi && buildozer -v android debug"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: aroxia-apk
        path: bin/*.apk
        retention-days: 30

    - name: Create Release (on tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
